name: CI — Build, Scan & Push

on:
  push:
    branches: [main]

jobs:
  build_and_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Build de l'image
        run: docker build -t cyberwatch-demo:${{ github.sha }} .

      - name: Scan Trivy — rapport complet (table)
        run: |
          trivy image \
            --format table \
            --output trivy-report.txt \
            --exit-code 0 \
            cyberwatch-demo:${{ github.sha }}

      - name: Gate sécurité — bloquer si CRITICAL uniquement
        run: |
          trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            cyberwatch-demo:${{ github.sha }}

      - name: Upload rapport Trivy
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt

  push_image:
    runs-on: ubuntu-latest
    needs: build_and_scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push
        id: build
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cyberwatch-demo:main-${{ github.sha }}

      - name: Afficher le digest de l'image
        run: |
          echo "Image digest : ${{ steps.build.outputs.digest }}"
          echo "L'image est épinglée par digest SHA256 — immuable"
